    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Question Database ---
        const rawQuestions = [
            // [온라인 1과목] 학습자 이해와 능력개발
            { id: 1, course: "1과목", session: "1차시", question: "다음 중 성인학습의 특징과 가장 거리가 먼 것은 무엇인가?", options: ["자기주도성", "경험의 활용", "사회적 역할의 반영", "외적동기"], answer: 3, explanation: "성인학습은 외부적 보상보다는 내적 동기에 의해 학습이 이루어지는 경향이 강합니다." },
            { id: 2, course: "1과목", session: "1차시", question: "레빈슨의 생애구조 발달이론에서 중년 전환기의 4대 과제가 아닌 것은 무엇인가?", options: ["젊음(Young)과 노년(Old)", "파괴(Destruction)와 창조(Creation)", "친밀감(Intimacy)과 고립감(Isolation)", "남성성(Masculine)과 여성성(Feminine)"], answer: 2, explanation: "친밀감과 고립감은 에릭슨(Erikson)의 심리사회적 발달단계 중 성인 초기 과제입니다." },
            { id: 3, course: "1과목", session: "1차시", question: "다음 중 인간의 삶을 일련의 발달과업을 수행하는 과정으로 본 이론은 무엇인가?", options: ["헤비거스트(Havighurst)의 발달과업이론", "에릭슨(Erikson)의 심리사회적 발달이론", "레빈슨(Levinson)의 생애구조 발달이론", "수퍼(Super)의 진로발달이론"], answer: 0, explanation: "헤비거스트는 생애 단계별로 반드시 성취해야 할 발달과업이 있다고 보았습니다." },
            { id: 4, course: "1과목", session: "2차시", question: "다음 중 성인학습자의 인지적 특성의 구체적 양상과 가장 거리가 먼 것은 무엇인가?", options: ["성취욕과 자기효능감", "경험기반의 지식 구조", "문제해결 중심의 인지 처리", "인지적 편향과 확증편향"], answer: 0, explanation: "성취욕과 자기효능감은 인지적 특성이 아닌 '정서적 특성'에 해당합니다." },
            { id: 5, course: "1과목", session: "2차시", question: "하울(Houle)이 분류한 성인학습자의 교육참여 동기 유형에 해당되지 않는 것은 무엇인가?", options: ["목표지향형", "사회지향형", "활동지향형", "학습지향형"], answer: 1, explanation: "하울은 목표지향형, 활동지향형, 학습지향형의 세 가지로 분류했습니다." },
            { id: 6, course: "1과목", session: "2차시", question: "김씨는 새로운 사람들과 어울리며 시간을 보내고 싶어 지역 평생학습관의 노래교실에 등록했다. 이 경우 학습참여 유형은 무엇인가?", options: ["사회지향형", "학습지향형", "목표지향형", "활동지향형"], answer: 3, explanation: "활동지향형은 학습 그 자체보다 활동이 제공하는 사회적 접촉이나 탈피를 목적으로 합니다." },
            { id: 7, course: "1과목", session: "3차시", question: "스키너의 조작적 조건형성과 가장 직접적으로 관련된 개념은 무엇인가?", options: ["강화와 결과", "동화와 조절", "자기효능감", "근접발달영역(ZPD)"], answer: 0, explanation: "스키너는 특정 행동 후 주어지는 강화(보상)가 행동의 빈도를 결정한다고 보았습니다." },
            { id: 8, course: "1과목", session: "3차시", question: "매슬로우 이론에서 '자아실현'은 어떤 개념을 의미하는가?", options: ["생리적 욕구 충족", "사회적 관계 강화", "잠재력의 최대 실현", "외적 보상을 통한 동기 강화"], answer: 2, explanation: "자아실현은 인간이 가질 수 있는 최상위 욕구로 자신의 잠재력을 최대한 발휘하는 것입니다." },
            { id: 9, course: "1과목", session: "3차시", question: "가네(Gagne)의 9가지 수업사태에 포함되지 않는 단계는 무엇인가?", options: ["주의집중", "수행 유도", "학습 분위기 조성", "파지와 전이 증진"], answer: 2, explanation: "가네의 9가지 수업사태에는 '학습 분위기 조성'이라는 명칭의 단계는 없습니다." },
            { id: 10, course: "1과목", session: "4차시", question: "자기주도학습(SDL)의 핵심 특징은 무엇인가?", options: ["외적 보상 중심 학습", "학습자의 전 과정을 자율적으로 설계하고 관리", "교사의 일방적 지시", "단기 훈련 중심"], answer: 1, explanation: "SDL은 학습자가 학습의 주체가 되어 목표 설정부터 평가까지 주도하는 것입니다." },
            { id: 11, course: "1과목", session: "4차시", question: "메지로우(Mezirow)의 전환학습에서 '혼란스러운 계기(disorienting dilemma)'의 역할은 무엇인가?", options: ["학습의 마무리 단계이다.", "기존 관점을 촉발, 도전하여 성찰을 유도하는 출발점이다.", "단순한 정보 제공에 해당한다.", "외적 보상을 제공한다."], answer: 1, explanation: "전환학습은 기존의 의미체계를 뒤흔드는 '혼란스러운 계기'에서 시작됩니다." },
            { id: 12, course: "1과목", session: "4차시", question: "Kolb의 경험학습 순환에서 '반성적 성찰(Reflective Observation)'에 해당하는 활동은 무엇인가?", options: ["새 전략을 직접 적용해 보는 것", "실습 후 결과를 되돌아보며 이유를 분석하는 것", "이론을 암기하는 것", "즉시 반복 훈련하는 것"], answer: 1, explanation: "경험한 내용을 되돌아보며 의미를 찾고 분석하는 과정이 반성적 성찰입니다." },
            { id: 13, course: "1과목", session: "5차시", question: "성인 훈련생의 학습 동기 특징으로 가장 적절한 것은 무엇인가?", options: ["외부 보상 중심", "경험보다 지식의 양을 중시", "학습 목적이 실용적이고 문제 중심적", "타인의 평가가 동기 형성에 절대적"], answer: 2, explanation: "성인 학습자는 즉시 적용 가능한 지식과 문제 해결 중심의 학습을 선호합니다." },
            { id: 14, course: "1과목", session: "5차시", question: "내재적 동기의 예로 가장 적절한 것은 무엇인가?", options: ["승진을 위한 자격증 취득", "상여금 지급", "지식 탐구 자체에서 얻는 즐거움", "조직의 교육 이수 요구"], answer: 2, explanation: "내재적 동기는 행위 자체가 주는 즐거움과 만족감에서 비롯됩니다." },
            { id: 15, course: "1과목", session: "5차시", question: "Houle의 목표지향형 훈련생은 어떤 특성을 보이는가?", options: ["사교적 만남을 위해 학습함", "지적 호기심 충족이 핵심 목적임", "스트레스 해소를 위한 도피 활동", "특정 목표 달성을 위해 학습에 참여함"], answer: 3, explanation: "목표지향형은 명확한 목적(자격증, 취업 등)을 가지고 학습에 임합니다." },
            { id: 16, course: "1과목", session: "6차시", question: "진로, 직업상담형의 핵심 목적은 무엇인가?", options: ["훈련생의 정서 안정 지원", "장기적 경력 방향과 전환 경로 설계", "훈련생의 시간 관리 지도", "학습 동기 강화"], answer: 1, explanation: "진로 상담은 단순히 직업을 구하는 것을 넘어 생애 전반의 경력을 설계하는 것입니다." },
            { id: 17, course: "1과목", session: "6차시", question: "학습 전략, 메타인지 상담형에 가장 적합한 주제는 무엇인가?", options: ["정서적 지지 제공", "미래 경력 비전 찾기", "공부법과 자기 조절 전략 점검", "갈등 조정"], answer: 2, explanation: "메타인지는 자신의 인지 과정을 파악하는 것으로 학습 방법 개선이 주 목표입니다." },
            { id: 18, course: "1과목", session: "6차시", question: "심리, 정서 조절 상담형의 주요 목표는 무엇인가?", options: ["직업능력 향상", "불안, 스트레스 관리", "자격증 취득", "실습계획 수립"], answer: 1, explanation: "훈련 과정 중 발생하는 심리적 어려움을 해소하여 안정적인 훈련 참여를 돕습니다." },

            // [온라인 2과목] 직업훈련교사의 책무와 역량
            { id: 19, course: "2과목", session: "1차시", question: "직업훈련교사의 역할 중 운영자(Facilitator)에 해당하는 활동은 무엇인가?", options: ["훈련 목표 수립", "이론, 실습 수행 진행", "직무 분석 수행", "프로그램 전체 평가"], answer: 1, explanation: "운영자는 설계된 교육을 실제로 실행하고 학습 참여를 촉진하는 역할을 합니다." },
            { id: 20, course: "2과목", session: "1차시", question: "직업훈련교사의 사회적 책무에 대한 설명으로 가장 적절한 것은 무엇인가?", options: ["개별 훈련생의 학습권만 보장하면 된다.", "사회, 산업 변화와는 무관하게 교육 내용을 유지한다.", "취약계층의 역량 향상을 통해 사회적 포용에 기여한다.", "산업체 요구보다 교육기관 내부 규정만 우선한다."], answer: 2, explanation: "직업훈련은 사회적 약자의 경제적 자립을 돕는 포용적 가치를 포함합니다." },
            { id: 21, course: "2과목", session: "1차시", question: "직업훈련교사의 윤리적 책임으로 적절하지 않은 것은?", options: ["평가의 공정성 유지", "실습 안전 확보", "직무와 관련없는 개인적 신념 강요", "훈련생의 다양성 존중"], answer: 2, explanation: "교사는 자신의 개인적 신념을 훈련생에게 강요해서는 안 됩니다." },
            { id: 22, course: "2과목", session: "2차시", question: "다음 중 '역량(Competency)'의 구성요소로 가장 적절한 것은 무엇인가?", options: ["지식, 기술, 태도, 행동", "지식, 나이, 학력, 경력", "열정, 창의력, 도전정신", "기술, 급여, 경력, 경쟁률"], answer: 0, explanation: "역량은 KSA(Knowledge, Skill, Attitude)와 실제 행동으로 구성된 통합적 개념입니다." },
            { id: 23, course: "2과목", session: "2차시", question: "직업훈련교사에게 필요한 역량 중 '훈련 요구분석 능력'은 어디에 위치하는가?", options: ["산업, 기술 역량", "교육과정 설계, 개발 역량", "교수, 학습 역량", "조직 운영 역량"], answer: 1, explanation: "요구분석은 교육 목표와 내용을 정하는 과정 설계의 핵심 단계입니다." },
            { id: 24, course: "2과목", session: "2차시", question: "3급에서 2급으로의 성장 과정의 특징으로 가장 적절한 것은 무엇인가?", options: ["실습 중심에서 정책 중심으로 변화", "기술 중심에서 교육학, 평가 중심으로 변화", "기관 운영 중심에서 강의 중심으로 변화", "전략 중심에서 현장 중심으로 변화"], answer: 1, explanation: "급수가 올라갈수록 기술 전수자에서 교육 공학적 설계자로 역할이 확장됩니다." },
            { id: 25, course: "2과목", session: "3차시", question: "자기역량 진단이란 무엇을 의미하는가?", options: ["교사의 성과를 외부 전문가가 평가하는 과정", "교사의 개인적 특성과 태도를 종합적으로 평가하는 과정", "자신의 역량 수준을 스스로 점검하고 성장을 계획하는 과정", "훈련생의 수업 만족도를 조사하는 과정"], answer: 2, explanation: "자기역량 진단은 스스로의 부족한 점을 파악하여 개발 계획을 세우는 성찰 활동입니다." },
            { id: 26, course: "2과목", session: "3차시", question: "자기역량 진단이 필요한 이유로 가장 알맞은 것은 무엇인가?", options: ["교사의 연간 성과를 평가하기 위해", "수업 품질과 교수 행동을 개선하기 위해", "훈련생의 출결률을 관리하기 위해", "교재의 난이도를 조정하기 위해"], answer: 1, explanation: "지속적인 자가 진단은 교수 품질을 유지하고 발전시키는 원동력이 됩니다." },
            { id: 27, course: "2과목", session: "4차시", question: "CDP 작성 시 포함해야 할 내용으로 가장 적절한 것은 무엇인가?", options: ["교사 개인의 취미생활 계획", "수업 준비물 목록", "핵심역량 진단 요약과 개선 목표", "학생 출결 관리 방법"], answer: 2, explanation: "CDP(Career Development Plan)는 역량 진단 결과와 향후 학습 목표가 명시되어야 합니다." },

            // [온라인 3과목] 수업 설계 전략 입문
            { id: 28, course: "3과목", session: "2차시", question: "ADDIE 모형의 단계가 아닌 것은 무엇인가?", options: ["분석", "설계", "운영", "평가"], answer: 2, explanation: "ADDIE는 분석(Analysis), 설계(Design), 개발(Development), 실행(Implementation), 평가(Evaluation)입니다." },
            { id: 29, course: "3과목", session: "3차시", question: "PBL(문제기반학습)에서 가장 중요한 문제 조건은 무엇인가?", options: ["하나의 정답이 존재하는 문제", "단순 계산으로 해결되는 문제", "비구조적이며 해결이 여러 가지일 수 있는 문제", "짧고 빠르게 풀 수 있는 문제"], answer: 2, explanation: "PBL은 실제 세계의 복잡하고 비구조적인 문제를 해결하며 배우는 방식입니다." },
            { id: 30, course: "3과목", session: "4차시", question: "메타인지의 개념으로 가장 적절한 것은 무엇인가?", options: ["학습 내용을 암기하는 능력", "학습 과정에서 자신의 사고를 점검하고 조절하는 능력", "지식을 빠르게 검색하는 능력", "타인의 학습을 지도하는 능력"], answer: 1, explanation: "메타인지는 '생각에 대한 생각'으로, 자신의 인지 상태를 모니터링하는 것입니다." },
            { id: 31, course: "3과목", session: "5차시", question: "플립러닝(Flipped Learning)의 특징으로 적절한 것은 무엇인가?", options: ["교실에서 이론 강의만 수행", "사전 학습 없이 참여", "사전 학습에서 개념을 습득하고 수업 중 활동 중심 운영", "과제 중심의 개별 학습"], answer: 2, explanation: "강의는 영상 등으로 미리 학습하고 수업 시간엔 토론이나 실습을 합니다." },

            // [온라인 4과목] 수업설계의 이해
            { id: 32, course: "4과목", session: "1차시", question: "행동주의 관점의 수업 설계 특징은 무엇인가?", options: ["학습자의 지식 구성을 강조", "사회적 상협을 통한 학습", "명세적인 학습 목표 설정 및 보상", "학습자 주도의 문제 해결"], answer: 2, explanation: "행동주의는 관찰 가능한 행동 변화를 목표로 하며 목표와 자극-반응을 중시합니다." },
            { id: 33, course: "4과목", session: "2차시", question: "목표를 진술할 때 사용할 수 없는 내현적 동사는 무엇인가?", options: ["확인한다", "설명한다", "이해한다", "조절한다"], answer: 2, explanation: "'이해한다'는 밖으로 드러나지 않아 측정이 어려운 내현적 동사입니다." },
            { id: 34, course: "4과목", session: "4차시", question: "상대평가와 비교했을 때 절대평가(준거지향평가)의 특징은?", options: ["집단 내 등수 중시", "사전에 설정된 도달 목표 기준", "정규 분포 곡선 활용", "경쟁을 통한 동기 부여"], answer: 1, explanation: "절대평가는 남과 비교하는 것이 아니라 목표 도달 여부만을 평가합니다." },
            { id: 35, course: "4과목", session: "5차시", question: "수행평가 채점 시 루브릭(Rubric)의 역할은?", options: ["객관식 문항 개발", "학습자의 암기력 측정", "평가자의 주관성 배제 및 명확한 기준 제공", "성적의 순위 자동 계산"], answer: 2, explanation: "루브릭은 채점 기준표로, 주관적인 평가를 최대한 공정하게 만듭니다." },

            // [온라인 5과목] 직훈교사로서의 생애설계
            { id: 36, course: "5과목", session: "3차시", question: "생애설계의 핵심 영역 중 모든 생애 영역의 기반이 되는 것은?", options: ["일(직업)", "관계(사회)", "건강(신체, 정신)", "재무(경제)"], answer: 2, explanation: "건강은 일과 삶을 영위하기 위한 가장 근본적인 에너지 원천입니다." },
            { id: 37, course: "5과목", session: "6차시", question: "자기돌봄(Self-care)에 대한 설명으로 옳은 것은?", options: ["위기 상황 발생 시에만 필요", "감정을 억제하는 과정", "신체적, 정서적 건강 유지를 위한 의도적 활동", "타인의 평가에 집중하는 행위"], answer: 2, explanation: "교사 스스로를 돌보는 것은 지속적인 교육을 위한 필수 조건입니다." },

            // [온라인 6과목] 훈련생 이해 및 상담 이론
            { id: 38, course: "6과목", session: "2차시", question: "경력단절여성 훈련생 상담 시 바람직하지 않은 태도는?", options: ["자신감 부족에 대한 공감", "가족과의 갈등 상황 탐색", "생애 역할 중 직업인 역할만 절대시 강요", "훈련 성공 사례 제시"], answer: 2, explanation: "다양한 삶의 역할(어머니, 아내 등) 간의 균형을 고려해야 합니다." },
            { id: 39, course: "6과목", session: "3차시", question: "프로이트의 정신분석에서 사회적으로 그럴듯한 이유를 붙여 행동을 정당화하는 방어기제는?", options: ["합리화", "투사", "퇴행", "억압"], answer: 0, explanation: "합리화는 수용하기 어려운 감정이나 행동에 그럴싸한 근거를 대는 것입니다." },
            { id: 40, course: "6과목", session: "6차시", question: "홀랜드(Holland)의 직업성격 이론 중 사회복지사, 교사에게 적합한 유형은?", options: ["현실형(R)", "탐구형(I)", "예술형(A)", "사회형(S)"], answer: 3, explanation: "사회형(Social)은 사람을 돕고 교육하고 치료하는 활동에 흥미를 느낍니다." },
        ];

        // --- Utils ---
        const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

        // --- App Component ---
        const App = () => {
            const [view, setView] = useState('home'); // home, quiz, result
            const [quizMode, setQuizMode] = useState(null); // 'unit', 'mock'
            const [selectedCourse, setSelectedCourse] = useState('1과목');
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState([]);
            const [score, setScore] = useState(0);
            const [showExplanation, setShowExplanation] = useState(false);

            const courses = ["1과목", "2과목", "3과목", "4과목", "5과목", "6과목"];

            const startQuiz = (mode, courseName = '1과목') => {
                let selectedPool = [];
                if (mode === 'unit') {
                    selectedPool = shuffle(rawQuestions.filter(q => q.course === courseName)).slice(0, 5);
                } else {
                    selectedPool = shuffle(rawQuestions).slice(0, 40);
                }
                
                setQuestions(selectedPool);
                setQuizMode(mode);
                setSelectedCourse(courseName);
                setCurrentIndex(0);
                setUserAnswers(new Array(selectedPool.length).fill(null));
                setShowExplanation(false);
                setView('quiz');
            };

            const handleAnswer = (optionIdx) => {
                // 이미 정답확인 상태면 답을 바꾸지 못하게 하려면 아래 조건 추가 (현재는 자유롭게 변경 가능)
                const newAnswers = [...userAnswers];
                newAnswers[currentIndex] = optionIdx;
                setUserAnswers(newAnswers);
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                    setShowExplanation(false);
                } else {
                    calculateResult();
                }
            };

            const prevQuestion = () => {
                if (currentIndex > 0) {
                    setCurrentIndex(currentIndex - 1);
                    setShowExplanation(false);
                }
            };

            const calculateResult = () => {
                let correctCount = 0;
                questions.forEach((q, idx) => {
                    if (userAnswers[idx] === q.answer) correctCount++;
                });
                const finalScore = Math.round((correctCount / questions.length) * 100);
                setScore(finalScore);
                setView('result');
            };

            const restart = () => {
                setView('home');
            };

            // --- Views ---
            if (view === 'home') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center">
                            <div className="bg-blue-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-graduation-cap text-white text-3xl"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">직업훈련교사 CBT</h1>
                            <p className="text-gray-500 mb-8 text-sm">종합평가 대비 연습 프로그램</p>
                            
                            <div className="space-y-4">
                                <div className="border rounded-xl p-4 bg-gray-50">
                                    <h3 className="font-bold text-gray-700 mb-3 flex items-center justify-center">
                                        <i className="fas fa-book-open mr-2 text-blue-500"></i> 단원별 연습 (5문항)
                                    </h3>
                                    <select 
                                        className="w-full p-2 border rounded-lg mb-3 outline-none focus:ring-2 focus:ring-blue-400"
                                        value={selectedCourse}
                                        onChange={(e) => setSelectedCourse(e.target.value)}
                                    >
                                        {courses.map(c => <option key={c} value={c}>{c} : {
                                            c === '1과목' ? '학습자 이해' :
                                            c === '2과목' ? '교사의 책무' :
                                            c === '3과목' ? '수업 설계 입문' :
                                            c === '4과목' ? '수업설계 이해' :
                                            c === '5과목' ? '생애 설계' : '상담 이론'
                                        }</option>)}
                                    </select>
                                    <button 
                                        onClick={() => startQuiz('unit', selectedCourse)}
                                        className="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
                                    >
                                        연습 시작
                                    </button>
                                </div>

                                <button 
                                    onClick={() => startQuiz('mock')}
                                    className="w-full bg-indigo-600 text-white py-4 rounded-xl hover:bg-indigo-700 transition flex items-center justify-center font-bold text-lg shadow-lg"
                                >
                                    <i className="fas fa-file-signature mr-3"></i> 전체 모의고사 시작
                                </button>
                                <p className="text-xs text-gray-400">40문항 / 100점 만점 / 60점 이상 합격</p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const currentQ = questions[currentIndex];
                return (
                    <div className="min-h-screen bg-gray-100 flex flex-col">
                        <header className="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center">
                                <span className={`px-2 py-1 rounded text-xs font-bold mr-3 ${quizMode === 'unit' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                    {quizMode === 'unit' ? '단원 연습' : '모의고사'}
                                </span>
                                <h2 className="font-bold text-gray-700">{currentQ.course} {currentQ.session}</h2>
                            </div>
                            <div className="text-gray-500 text-sm">
                                <span className="text-blue-600 font-bold">{currentIndex + 1}</span> / {questions.length}
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            <div className="max-w-3xl mx-auto">
                                <div className="bg-white rounded-2xl shadow-md p-6 md:p-10 mb-6">
                                    <div className="text-lg md:text-xl font-medium text-gray-800 mb-8 leading-relaxed">
                                        <span className="text-blue-500 font-bold mr-2">Q.</span>
                                        {currentQ.question}
                                    </div>

                                    <div className="space-y-3">
                                        {currentQ.options.map((opt, idx) => {
                                            const isSelected = userAnswers[currentIndex] === idx;
                                            const isCorrectAnswer = showExplanation && idx === currentQ.answer;

                                            // 기본 스타일 (선택 안됨)
                                            let btnClass = "border-gray-100 hover:border-gray-300 bg-white text-gray-600";
                                            let numClass = "bg-gray-100 text-gray-500";
                                            
                                            if (isCorrectAnswer) {
                                                // 정답 확인 시 실제 정답 (연두색 강조 - lime-500)
                                                btnClass = "border-lime-500 bg-lime-50 text-lime-700 shadow-inner font-bold";
                                                numClass = "bg-lime-500 text-white";
                                            } else if (isSelected) {
                                                // 사용자가 선택한 답 (파란색)
                                                btnClass = "border-blue-500 bg-blue-50 text-blue-700 shadow-inner";
                                                numClass = "bg-blue-500 text-white";
                                            }

                                            return (
                                                <button
                                                    key={idx}
                                                    onClick={() => handleAnswer(idx)}
                                                    className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-center justify-between ${btnClass}`}
                                                >
                                                    <div className="flex items-center">
                                                        <span className={`w-8 h-8 rounded-full flex items-center justify-center mr-4 shrink-0 font-bold ${numClass}`}>
                                                            {idx + 1}
                                                        </span>
                                                        <span>{opt}</span>
                                                    </div>
                                                    {isCorrectAnswer && (
                                                        <i className="fas fa-check text-lime-500 text-xl ml-2"></i>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    
                                    {showExplanation && (
                                        <div className="mt-8 p-4 bg-yellow-50 border border-yellow-200 rounded-xl animate-fade-in">
                                            <p className="text-sm font-bold text-yellow-800 mb-1"><i className="fas fa-info-circle mr-2"></i> 해설</p>
                                            <p className="text-sm text-yellow-900">{currentQ.explanation}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>

                        <footer className="bg-white border-t p-4 flex justify-between items-center px-4 md:px-20">
                            <button 
                                onClick={prevQuestion}
                                disabled={currentIndex === 0}
                                className={`px-6 py-2 rounded-lg font-bold transition ${currentIndex === 0 ? 'text-gray-300' : 'text-gray-600 hover:bg-gray-100'}`}
                            >
                                <i className="fas fa-arrow-left mr-2"></i> 이전
                            </button>

                            {quizMode === 'unit' && (
                                <button 
                                    onClick={() => setShowExplanation(!showExplanation)}
                                    className="bg-gray-100 text-gray-600 px-4 py-2 rounded-lg text-sm hover:bg-gray-200"
                                >
                                    {showExplanation ? '해설 숨기기' : '정답 확인'}
                                </button>
                            )}

                            <button 
                                onClick={nextQuestion}
                                disabled={userAnswers[currentIndex] === null}
                                className={`px-8 py-2 rounded-lg font-bold transition shadow-lg ${
                                    userAnswers[currentIndex] === null 
                                    ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                                    : 'bg-blue-600 text-white hover:bg-blue-700'
                                }`}
                            >
                                {currentIndex === questions.length - 1 ? '제출하기' : '다음'} <i className="fas fa-arrow-right ml-2"></i>
                            </button>
                        </footer>
                    </div>
                );
            }

            if (view === 'result') {
                const pass = score >= 60;
                return (
                    <div className="min-h-screen bg-gray-50 flex flex-col p-4 md:p-8">
                        <div className="max-w-4xl mx-auto w-full">
                            <div className="bg-white rounded-3xl shadow-xl overflow-hidden mb-8">
                                <div className={`${pass ? 'bg-green-500' : 'bg-red-500'} p-10 text-center text-white`}>
                                    <div className="text-6xl mb-4">
                                        <i className={`fas ${pass ? 'fa-check-circle' : 'fa-times-circle'}`}></i>
                                    </div>
                                    <h2 className="text-3xl font-bold mb-2">{pass ? '합격을 축하합니다!' : '아쉽지만 불합격입니다.'}</h2>
                                    <div className="text-lg opacity-90">당신의 점수는 <span className="font-bold text-4xl ml-2">{score}</span>점 입니다.</div>
                                    {quizMode === 'mock' && <p className="mt-2 text-sm">기준: 60점 이상 합격</p>}
                                </div>
                                
                                <div className="p-8">
                                    <h3 className="font-bold text-gray-800 mb-6 flex items-center border-b pb-4">
                                        <i className="fas fa-list-check mr-3 text-blue-500"></i> 오답 및 해설 분석
                                    </h3>
                                    
                                    <div className="space-y-6 max-h-96 overflow-y-auto pr-2 custom-scrollbar">
                                        {questions.map((q, idx) => {
                                            const isCorrect = userAnswers[idx] === q.answer;
                                            return (
                                                <div key={idx} className={`p-5 rounded-2xl border-l-4 ${isCorrect ? 'bg-gray-50 border-green-400' : 'bg-red-50 border-red-400'}`}>
                                                    <div className="flex items-start justify-between mb-3">
                                                        <span className="font-bold text-gray-700">문항 {idx + 1}</span>
                                                        <span className={`text-xs px-2 py-1 rounded font-bold ${isCorrect ? 'text-green-600 bg-green-100' : 'text-red-600 bg-red-100'}`}>
                                                            {isCorrect ? '정답' : '오답'}
                                                        </span>
                                                    </div>
                                                    <p className="text-gray-800 mb-4">{q.question}</p>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-4">
                                                        <div className="text-sm">
                                                            <span className="text-gray-500">선택한 답:</span> 
                                                            <span className={`ml-2 font-medium ${isCorrect ? 'text-green-600' : 'text-red-600'}`}>
                                                                {q.options[userAnswers[idx]]}
                                                            </span>
                                                        </div>
                                                        <div className="text-sm">
                                                            <span className="text-gray-500">정답:</span> 
                                                            <span className="ml-2 font-bold text-blue-600">{q.options[q.answer]}</span>
                                                        </div>
                                                    </div>
                                                    <div className="bg-white p-3 rounded-lg border border-gray-100 text-xs text-gray-600 leading-relaxed shadow-sm">
                                                        <span className="font-bold text-blue-500">[해설]</span> {q.explanation}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="p-8 bg-gray-50 flex flex-col md:flex-row gap-4">
                                    <button 
                                        onClick={restart}
                                        className="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg"
                                    >
                                        처음으로 돌아가기
                                    </button>
                                    <button 
                                        onClick={() => startQuiz(quizMode, selectedCourse)}
                                        className="flex-1 bg-white text-blue-600 border-2 border-blue-600 py-4 rounded-xl font-bold hover:bg-blue-50 transition"
                                    >
                                        다시 풀기
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
